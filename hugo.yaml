baseURL: https://example.org/
locale: en-us
title: Iruha Dev
theme: ["PaperMod"]
params:
  description: "Iruha Dev — tech blog & personal site"
  images:
    - images/og-default.png
  profileMode:
    enabled: true
    title: "Ilham Adiputra" # optional default will be site title
    subtitle: "Mobile & Fullstack Developer"
    imageUrl: "images/avatar.png" # optional
    imageTitle: "Profile Photo" # optional
    imageWidth: 120 # custom size
    imageHeight: 120 # custom size
    buttons:
      - name: Blog
        url: "/posts"
      - name: Resume
        url: "/resume.pdf"
  label:
    icon: "/apple-touch-icon.png"
  socialIcons:
    - name: "LinkedIn"
      url: "https://www.linkedin.com/in/ilham-adiputra"
    - name: "Github"
      url: "https://github.com/ilham25"
    - name: "email"
      url: "mailto:job.ilhamadiputra4@gmail.com"

  # Post Related
  ShowToc: true
  TocOpen: true
  ShowBreadCrumbs: true
  ShowReadingTime: true
  ShowCodeCopyButtons: true

  assets:
    disableHLJS: true
  footer:
    text: "[GitHub](https://github.com/ilham25) · [LinkedIn](https://www.linkedin.com/in/ilham-adiputra)"
markup:
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: false
    noClasses: false # must be false to use external CSS
    style: github-dark # your chosen Chroma theme
